appId: com.oscilloscope.simulator
productName: 示波器仿真系统

directories:
  output: dist

files:
  - electron-main.js
  - docs/**/*
  - assets/**/*
  - "!docs/**/*.map"

extraResources:
  - from: docs
    to: docs

win:
  target:
    - target: portable
      arch:
        - x64
  requestedExecutionLevel: asInvoker
