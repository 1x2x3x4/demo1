<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1f4f" />
      <stop offset="60%" stop-color="#0a2d75" />
      <stop offset="100%" stop-color="#07183b" />
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e2b5d" />
      <stop offset="100%" stop-color="#061631" />
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#83d9ff" />
      <stop offset="100%" stop-color="#d7f4ff" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#5fa6da" stroke-opacity="0.16" stroke-width="1.5" />
    </pattern>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#bg)" />
  <rect x="36" y="36" width="440" height="440" rx="96" fill="none" stroke="#7dc5ff" stroke-opacity="0.24" stroke-width="4" />

  <circle cx="112" cy="112" r="92" fill="#d7f4ff" fill-opacity="0.06" />
  <circle cx="404" cy="118" r="72" fill="#7cc7ff" fill-opacity="0.08" />

  <rect x="98" y="118" width="316" height="240" rx="42" fill="url(#screen)" stroke="#95d8ff" stroke-width="18" />
  <rect x="118" y="138" width="276" height="200" rx="28" fill="#07142c" />
  <rect x="118" y="138" width="276" height="200" rx="28" fill="url(#grid)" opacity="0.92" />

  <path d="M 112 384 L 400 384" fill="none" stroke="#8fd4ff" stroke-width="18" stroke-linecap="round" stroke-opacity="0.95" />
  <path d="M 174 384 L 174 416" fill="none" stroke="#8fd4ff" stroke-width="18" stroke-linecap="round" />
  <path d="M 338 384 L 338 416" fill="none" stroke="#8fd4ff" stroke-width="18" stroke-linecap="round" />
  <path d="M 190 416 L 322 416" fill="none" stroke="#8fd4ff" stroke-width="20" stroke-linecap="round" />

  <path
    d="M 138 258
       L 176 258
       L 208 216
       L 236 300
       L 270 206
       L 302 258
       L 372 258"
    fill="none"
    stroke="#8fe8ff"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />
  <path
    d="M 138 258
       L 176 258
       L 208 216
       L 236 300
       L 270 206
       L 302 258
       L 372 258"
    fill="none"
    stroke="url(#trace)"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <circle cx="378" cy="170" r="10" fill="#8fe8ff" fill-opacity="0.9" />
</svg>
